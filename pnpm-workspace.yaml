  '@nyariv/sandboxjs': ^0.9.6
  brace-expansion: ^2.0.2
  fast-uri: ^3.1.2
  flatted: ^3.4.2
  form-data: ^4.0.6
  js-yaml: ^3.15.0
  lodash: ^4.18.0
  minimatch: ^9.0.7
  multer: ^2.2.0
  path-to-regexp: ^8.4.0
  picomatch: ^4.0.4
  qs: ^6.15.2